<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventShop — Crew Portal</title>
  <meta name="description" content="EventShop crew portal: claim shifts, log hours, upload documents, and get paid." />
  <link rel="icon" href="/assets/es-logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canary: "#F6D22C",
            forest: "#1F3D2B",
            ink: "#0B0B0B",
          },
          fontFamily: {
            display: ["Archivo", "Arial Narrow", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #ffffff; color: #0B0B0B; font-family: Archivo, system-ui, sans-serif; }
    ::selection { background: #F6D22C; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/app.js"></script>
</body>
</html>
